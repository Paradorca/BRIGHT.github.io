<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIGHT - 作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', 'Noto Sans SC', sans-serif;
            background-color: #f5f5f0;
            color: #000;
            overflow-x: hidden;
        }
        
        /* 几何装饰元素 */
        .geo-circle {
            position: absolute;
            border-radius: 50%;
            background: #d62d20;
            z-index: 0;
        }
        
        .geo-triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            z-index: 0;
        }
        
        .geo-rect {
            position: absolute;
            background: #000;
            z-index: 0;
        }
        
        .diagonal-line {
            position: absolute;
            background: #000;
            transform: rotate(-15deg);
            z-index: 0;
        }
        
        /* 网格系统 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 头部区域 - 对角线排版 */
        header {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .header-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: linear-gradient(135deg, #f5f5f0 50%, #d62d20 50%);
            z-index: 0;
        }
        
        .title-main {
            position: relative;
            z-index: 2;
            transform: rotate(-5deg);
            text-align: center;
        }
        
        h1 {
            font-size: clamp(60px, 12vw, 140px);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            text-transform: uppercase;
            color: #000;
            text-shadow: 4px 4px 0px #d62d20;
        }
        
        .subtitle {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 700;
            margin-top: 30px;
            transform: rotate(2deg);
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 10px 30px;
            letter-spacing: 0.2em;
        }
        
        /* 内容区块 - 不对称网格 */
        .content-section {
            position: relative;
            padding: 100px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        
        .section-title {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            transform: rotate(-3deg);
            margin-bottom: 40px;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 8px;
            background: #d62d20;
        }
        
        /* 画作展示 - 几何框架 */
        .artworks-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            position: relative;
        }
        
        .artwork-card {
            position: relative;
            overflow: hidden;
            border: 4px solid #000;
            background: #fff;
            transform: rotate(var(--rotation));
        }
        
        .artwork-card:nth-child(1) { --rotation: -2deg; }
        .artwork-card:nth-child(2) { --rotation: 1deg; margin-top: 40px; }
        .artwork-card:nth-child(3) { --rotation: -1deg; }
        
        .artwork-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%);
            transition: all 0.3s;
        }
        
        .artwork-card:hover img {
            filter: grayscale(0%);
        }
        
        .artwork-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #d62d20;
            color: #fff;
            padding: 10px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .artwork-card:hover .artwork-label {
            transform: translateY(0);
        }
        
        /* 文章列表 - 工业感排版 */
        .articles-list {
            border-left: 6px solid #000;
            padding-left: 30px;
        }
        
        .article-item {
            margin-bottom: 40px;
            position: relative;
            transform: rotate(1deg);
            background: #fff;
            border: 3px solid #000;
            padding: 25px;
            transition: all 0.3s;
        }
        
        .article-item:hover {
            transform: rotate(0deg) translateX(10px);
            box-shadow: -8px 8px 0 #d62d20;
        }
        
        .article-item a {
            text-decoration: none;
            color: inherit;
        }
        
        .article-title {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        
        .article-date {
            font-size: 14px;
            font-weight: 700;
            color: #d62d20;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }
        
        .article-desc {
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }
        
        /* 页脚 */
        footer {
            background: #000;
            color: #fff;
            padding: 60px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: repeating-linear-gradient(
                45deg,
                #d62d20,
                #d62d20 10px,
                transparent 10px,
                transparent 20px
            );
        }
        
        .contact-info {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .content-section {
                grid-template-columns: 1fr;
            }
            .artworks-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <header>
        <div class="header-bg"></div>
        <div class="geo-circle" style="width: 200px; height: 200px; top: 10%; right: 10%; opacity: 0.3;"></div>
        <div class="geo-rect" style="width: 100px; height: 400px; bottom: 0; left: 5%;"></div>
        
        <div class="title-main">
            <h1>PARADORCA</h1>
            <div class="subtitle">构成 / 创作 / 观察</div>
        </div>
    </header>
    
    <!-- 画作展示区 -->
    <section class="content-section container">
        <div>
            <h2 class="section-title">画作<br>ARTWORKS</h2>
            <p style="font-size: 18px; line-height: 1.6; margin-top: 20px; max-width: 400px;">
                几何与色彩的实验。探索形式与空间的对抗关系，在严格的构成中寻找自由的表达。
            </p>
        </div>
        
        <div class="artworks-grid">
            <div class="artwork-card">
                <img src="artwork-1.jpg" alt="作品1">
                <div class="artwork-label">构成 No.1</div>
            </div>
            <div class="artwork-card">
                <img src="artwork-2.jpg" alt="作品2">
                <div class="artwork-label">红色序列</div>
            </div>
            <div class="artwork-card">
                <img src="artwork-3.jpg" alt="作品3">
                <div class="artwork-label">空间研究</div>
            </div>
        </div>
    </section>
    
    <!-- 文章列表区 -->
    <section class="container" style="margin-top: 100px;">
        <h2 class="section-title">文字<br>TEXTS</h2>
        
        <div class="articles-list">
            <div class="article-item">
                <a href="https://mp.weixin.qq.com/s/xxxxxx" target="_blank">
                    <div class="article-date">2024.03.15</div>
                    <div class="article-title">构成的逻辑：从罗德琴科到现代设计</div>
                    <div class="article-desc">探讨构成主义对当代视觉文化的影响，以及在数字时代的新的可能性...</div>
                </a>
            </div>
            
            <div class="article-item" style="transform: rotate(-1deg); margin-left: 40px;">
                <a href="https://mp.weixin.qq.com/s/xxxxxx" target="_blank">
                    <div class="article-date">2024.02.28</div>
                    <div class="article-title">几何观察法：城市中的构成元素</div>
                    <div class="article-desc">如何用构成主义的眼睛重新看待日常空间...</div>
                </a>
            </div>
        </div>
    </section>
    
    <!-- 页脚 -->
    <footer style="margin-top: 150px;">
        <div class="contact-info">
            CONTACT: YOUR.EMAIL@EXAMPLE.COM
        </div>
    </footer>
</body>
</html>
